<head>

<title>Horn of Africa Moments</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#fbf9f5; --paper-2:#f2ece2; --ink:#1b1714; --ink-deep:#211b16;
  --soft:#5a514a; --line:#e6ddd0; --line-dk:rgba(255,255,255,.14);
  --accent:#a85532; --accent-2:#c98a3a;
  --fd:'Fraunces',Georgia,serif; --fb:'Inter',system-ui,sans-serif;
  --shadow:0 30px 60px -34px rgba(27,23,20,.42);
}
*{box-sizing:border-box; margin:0; padding:0;}
html{scroll-behavior:smooth;}
body{font-family:var(--fb); color:var(--ink); background:var(--paper); -webkit-font-smoothing:antialiased; line-height:1.65;}
img{display:block; max-width:100%;}
::selection{background:var(--ink); color:var(--paper);}
.wrap{max-width:1200px; margin:0 auto; padding:0 32px;}
.sec{padding:120px 0;}
.kicker{font-family:var(--fb); font-size:12px; font-weight:600; letter-spacing:.22em; text-transform:uppercase; color:var(--accent); display:inline-flex; align-items:center; gap:12px;}
.kicker::before{content:""; width:26px; height:1px; background:var(--accent);}
.h2{font-family:var(--fd); font-weight:500; font-size:clamp(32px,4.6vw,54px); line-height:1.08; letter-spacing:-.01em;}
.lead{color:var(--soft); font-size:19px; line-height:1.7; max-width:60ch;}

.btn{font-family:var(--fb); font-weight:500; font-size:14px; letter-spacing:.02em; border:1px solid transparent; border-radius:2px; padding:15px 28px; cursor:pointer; display:inline-flex; align-items:center; gap:9px; text-decoration:none; transition:transform .25s ease, background .25s ease, color .25s ease, box-shadow .25s ease;}
.btn-accent{background:var(--accent); color:#fff;}
.btn-accent:hover{background:#8f451f; transform:translateY(-2px); box-shadow:0 14px 28px -14px rgba(168,85,50,.7);}
.btn-ink{background:var(--ink); color:var(--paper);}
.btn-ink:hover{transform:translateY(-2px); box-shadow:0 14px 28px -16px rgba(27,23,20,.6);}
.btn-line{background:transparent; color:var(--ink); border-color:var(--ink);}
.btn-line:hover{background:var(--ink); color:var(--paper);}
.btn-ivory{background:var(--paper); color:var(--ink);}
.btn-ivory:hover{transform:translateY(-2px); box-shadow:0 14px 30px -16px rgba(0,0,0,.4);}
.btn-ghost-light{background:transparent; color:#fff; border-color:rgba(255,255,255,.4);}
.btn-ghost-light:hover{border-color:#fff; background:rgba(255,255,255,.06);}
.btn-block{width:100%; justify-content:center;}

/* header */
.hd{position:sticky; top:0; z-index:40; background:rgba(251,249,245,.82); backdrop-filter:blur(12px); border-bottom:1px solid var(--line);}
.hd-in{display:flex; align-items:center; gap:20px; height:76px;}
.brand{display:flex; align-items:center; gap:13px; text-decoration:none; color:var(--ink);}
.brand img{height:38px; width:auto;}
.brand .word{font-family:var(--fd); font-weight:600; font-size:19px; letter-spacing:-.01em; line-height:1;}
.nav{display:flex; gap:34px; margin-left:auto;}
.nav a{color:var(--ink); text-decoration:none; font-weight:400; font-size:15px; opacity:.72; position:relative; padding:4px 0;}
.nav a:hover{opacity:1;}
.nav a::after{content:""; position:absolute; left:0; bottom:0; width:0; height:1px; background:var(--accent); transition:width .25s ease;}
.nav a:hover::after{width:100%;}
.hd-actions{display:flex; align-items:center; gap:14px;}
.lang{display:inline-flex; align-items:center; font-family:var(--fb); font-size:12px; font-weight:600; letter-spacing:.05em; color:var(--soft);}
.lang button{background:none; border:0; cursor:pointer; color:var(--soft); padding:4px 5px; opacity:.55; transition:opacity .2s;}
.lang button.on{color:var(--ink); opacity:1;}
.lang span{opacity:.4;}
.burger{display:none; background:none; border:0; cursor:pointer; color:var(--ink);}

/* hero */
.hero{padding:88px 0 96px; position:relative;}
.hero-in{display:grid; grid-template-columns:1.05fr .95fr; gap:64px; align-items:center;}
.h1{font-family:var(--fd); font-weight:400; font-size:clamp(42px,6vw,76px); line-height:1.02; letter-spacing:-.02em;}
.h1 .em{font-style:italic; color:var(--accent);}
.hero .sub{margin:28px 0 36px; font-size:19px; line-height:1.7; color:var(--soft); max-width:50ch;}
.hero-cta{display:flex; gap:14px; flex-wrap:wrap; align-items:center;}
.hero-meta{margin-top:34px; padding-top:26px; border-top:1px solid var(--line); display:flex; gap:34px; flex-wrap:wrap;}
.hero-meta div span{display:block; font-family:var(--fd); font-size:26px; font-weight:500; line-height:1;}
.hero-meta div small{font-size:12.5px; letter-spacing:.04em; color:var(--soft); text-transform:uppercase;}
.hero-figure{position:relative;}
.hero-figure .frame{position:relative; aspect-ratio:4/5; border-radius:3px; overflow:hidden; box-shadow:var(--shadow);}
.hero-figure figcaption{position:absolute; left:20px; bottom:20px; right:20px; color:#fff; font-size:13px; letter-spacing:.02em; text-shadow:0 1px 12px rgba(0,0,0,.5);}
.hero-figure .tag{position:absolute; top:-14px; left:-14px; background:var(--accent); color:#fff; font-family:var(--fb); font-size:12px; font-weight:600; letter-spacing:.08em; text-transform:uppercase; padding:9px 16px; border-radius:2px;}

.ph{background:linear-gradient(150deg,#cdbfae,#8a7c6c); position:relative; width:100%; height:100%;}
.ph img{width:100%; height:100%; object-fit:cover; position:absolute; inset:0;}
.ph .fb{position:absolute; inset:0; display:none; place-items:center; color:rgba(255,255,255,.7);}

/* impact band */
.impact-band{background:var(--ink-deep); color:var(--paper);}
.ib-in{padding:84px 0; display:grid; grid-template-columns:repeat(4,1fr); gap:30px;}
.ib-stat{position:relative; padding-left:26px;}
.ib-stat::before{content:""; position:absolute; left:0; top:6px; bottom:6px; width:2px; background:var(--accent);}
.ib-stat .num{font-family:var(--fd); font-weight:500; font-size:clamp(40px,4.4vw,56px); line-height:1; letter-spacing:-.01em; font-variant-numeric:tabular-nums;}
.ib-stat .lab{margin-top:12px; font-size:14px; color:rgba(251,249,245,.66); line-height:1.4;}
.ib-note{font-family:var(--fb); font-size:11px; letter-spacing:.04em; color:rgba(251,249,245,.4); text-transform:uppercase; padding-bottom:40px;}

/* purpose */
.head-block{max-width:720px;}
.head-block .h2{margin-top:20px;}
.head-block .lead{margin-top:20px;}
.vgrid{display:grid; grid-template-columns:repeat(3,1fr); gap:2px; margin-top:64px; background:var(--line); border:1px solid var(--line); border-radius:3px; overflow:hidden;}
.vcard{background:var(--paper); padding:40px 36px; transition:background .3s ease;}
.vcard:hover{background:#fff;}
.vcard .vi{font-family:var(--fd); font-size:15px; font-style:italic; color:var(--accent); margin-bottom:18px;}
.vcard h3{font-family:var(--fd); font-weight:500; font-size:24px; letter-spacing:-.01em;}
.vcard p{color:var(--soft); margin-top:8px; font-size:15.5px;}

/* mission */
.mission{background:var(--paper-2);}
.mission-in{display:grid; grid-template-columns:.85fr 1.15fr; gap:72px; align-items:center;}
.mission-photo{aspect-ratio:4/5; border-radius:3px; overflow:hidden; box-shadow:var(--shadow);}
.quote{font-family:var(--fd); font-weight:400; font-size:clamp(23px,2.6vw,30px); line-height:1.42; letter-spacing:-.01em; margin:24px 0;}
.mission .lead{font-size:18px;}
.author{margin-top:30px; display:flex; align-items:center; gap:14px;}
.author .ln{width:30px; height:1px; background:var(--accent);}
.author span{font-family:var(--fb); font-size:13.5px; letter-spacing:.04em; color:var(--ink); font-weight:500;}

/* how */
.steps{display:grid; grid-template-columns:repeat(3,1fr); gap:48px; margin-top:64px;}
.step{padding-top:28px; border-top:1px solid var(--ink);}
.step .no{font-family:var(--fd); font-size:15px; color:var(--accent); letter-spacing:.05em;}
.step h3{font-family:var(--fd); font-weight:500; font-size:25px; margin:16px 0 10px; letter-spacing:-.01em;}
.step p{color:var(--soft); font-size:15.5px;}

/* involved */
.involved{background:var(--ink-deep); color:var(--paper);}
.involved .kicker{color:var(--accent-2);}
.involved .kicker::before{background:var(--accent-2);}
.involved .h2{color:var(--paper);}
.icards{display:grid; grid-template-columns:1fr 1fr; gap:28px; margin-top:60px;}
.icard{background:var(--paper); color:var(--ink); border-radius:3px; padding:44px 40px; display:flex; flex-direction:column;}
.icard.primary{box-shadow:0 0 0 2px var(--accent) inset;}
.itag{font-family:var(--fb); font-size:11px; font-weight:600; letter-spacing:.16em; text-transform:uppercase; color:var(--accent);}
.icard h3{font-family:var(--fd); font-weight:500; font-size:30px; margin:14px 0 14px; letter-spacing:-.01em;}
.icard p{color:var(--soft); font-size:16px;}
.ilist{list-style:none; margin:22px 0 0;}
.ilist li{font-size:15px; color:var(--ink); padding:11px 0 11px 24px; position:relative; border-top:1px solid var(--line);}
.ilist li::before{content:"\2014"; position:absolute; left:0; color:var(--accent);}
.icard .foot{margin-top:auto; padding-top:30px;}
.inote{font-size:13px; color:var(--soft); margin-top:14px; line-height:1.5;}

/* gallery */
.ggrid{display:grid; grid-template-columns:repeat(12,1fr); gap:16px; margin-top:60px;}
.gtile{border-radius:3px; overflow:hidden;}
.g-tall{grid-column:span 4; aspect-ratio:3/4;}
.g-wide{grid-column:span 4; aspect-ratio:3/4;}

/* partners */
.partners{background:var(--paper-2); text-align:center;}
.plogos{display:flex; flex-wrap:wrap; justify-content:center; gap:18px 48px; margin-top:36px; align-items:center;}
.plogo{font-family:var(--fd); font-weight:500; font-size:19px; color:var(--ink); opacity:.62;}
.pnote{font-family:var(--fb); font-size:11px; letter-spacing:.04em; color:var(--soft); text-transform:uppercase; margin-top:30px;}

/* newsletter */
.news{background:var(--ink-deep); color:var(--paper);}
.news-in{display:grid; grid-template-columns:1.1fr .9fr; gap:56px; align-items:center;}
.news .h2{color:var(--paper);}
.news p{color:rgba(251,249,245,.66); margin-top:16px; max-width:42ch;}
.nform{display:flex; gap:0; border-bottom:1px solid rgba(255,255,255,.3); padding-bottom:6px;}
.nform input{flex:1; background:transparent; border:0; color:#fff; font-family:var(--fb); font-size:16px; padding:12px 2px;}
.nform input::placeholder{color:rgba(255,255,255,.45);}
.nform input:focus{outline:0;}
.nform button{background:none; border:0; color:var(--accent-2); font-family:var(--fb); font-weight:600; font-size:14px; letter-spacing:.04em; cursor:pointer; padding:0 6px;}
.nok{font-family:var(--fd); font-style:italic; font-size:19px; color:var(--accent-2);}

/* footer */
.ft{background:var(--paper); border-top:1px solid var(--line);}
.ft-in{display:flex; flex-wrap:wrap; gap:40px; justify-content:space-between; padding:64px 0 28px;}
.ft .brand{margin-bottom:16px;}
.ft .muted{color:var(--soft); font-size:14.5px; line-height:1.95;}
.ft a{color:var(--ink); text-decoration:none; border-bottom:1px solid var(--line);}
.ft a:hover{border-color:var(--accent);}
.ft-base{display:flex; justify-content:space-between; flex-wrap:wrap; gap:12px; padding:24px 0; border-top:1px solid var(--line); font-size:12.5px; color:var(--soft);}

/* reveal */
.reveal{opacity:0; transform:translateY(20px); transition:opacity .8s cubic-bezier(.2,.7,.2,1), transform .8s cubic-bezier(.2,.7,.2,1);}
.reveal.in{opacity:1; transform:none;}

/* modal */
.ov{position:fixed; inset:0; background:rgba(27,23,20,.55); backdrop-filter:blur(5px); z-index:80; display:grid; place-items:center; padding:20px; animation:fade .25s ease;}
@keyframes fade{from{opacity:0}to{opacity:1}}
.modal{background:var(--paper); border-radius:4px; width:100%; max-width:540px; max-height:92vh; overflow:auto; box-shadow:0 50px 90px -24px rgba(0,0,0,.55); animation:rise .3s ease;}
@keyframes rise{from{transform:translateY(18px); opacity:.5}to{transform:none; opacity:1}}
.modal-hd{padding:34px 36px 26px; border-bottom:1px solid var(--line); position:relative;}
.modal-hd .itag{color:var(--accent);}
.modal-hd h3{font-family:var(--fd); font-weight:500; font-size:27px; letter-spacing:-.01em; margin-top:8px;}
.modal-hd p{color:var(--soft); font-size:14.5px; margin-top:6px;}
.x{position:absolute; top:24px; right:24px; background:none; border:1px solid var(--line); color:var(--ink); width:36px; height:36px; border-radius:50%; cursor:pointer; font-size:17px; line-height:1; transition:background .2s;}
.x:hover{background:var(--paper-2);}
.modal-bd{padding:28px 36px 34px;}
.field{margin-bottom:18px;}
.field label{display:block; font-size:13px; font-weight:500; margin-bottom:8px; color:var(--ink);}
.field input, .field select, .field textarea{width:100%; border:1px solid var(--line); border-radius:3px; padding:13px 15px; font-family:var(--fb); font-size:15px; background:#fff; color:var(--ink);}
.field input:focus, .field select:focus, .field textarea:focus{outline:0; border-color:var(--accent); box-shadow:0 0 0 3px rgba(168,85,50,.12);}
.field textarea{resize:vertical; min-height:76px;}
.chips{display:flex; flex-wrap:wrap; gap:9px;}
.chip{font-size:13.5px; border:1px solid var(--line); border-radius:2px; padding:9px 15px; cursor:pointer; background:#fff; user-select:none; transition:all .2s;}
.chip.on{background:var(--ink); color:var(--paper); border-color:var(--ink);}
.err{color:var(--accent); font-size:13.5px; margin-bottom:14px; font-weight:500;}
.ok{text-align:center; padding:18px 6px 6px;}
.ok .ring{width:62px; height:62px; border-radius:50%; border:1.5px solid var(--accent); display:grid; place-items:center; margin:0 auto 18px; color:var(--accent);}
.ok h3{font-family:var(--fd); font-weight:500; font-size:26px; margin-bottom:10px;}
.ok p{color:var(--soft);}

.mobile-nav{display:none; background:var(--paper); border-bottom:1px solid var(--line); padding:16px 32px;}
.mobile-nav a{display:block; padding:13px 0; color:var(--ink); text-decoration:none; font-size:16px; border-bottom:1px solid var(--paper-2);}

@media (max-width:900px){
  .nav{display:none;} .burger{display:block;} .hd-actions .btn{display:none;}
  .hero-in,.mission-in,.news-in{grid-template-columns:1fr; gap:48px;}
  .hero-figure{max-width:420px; margin:0 auto;}
  .vgrid,.steps,.icards,.ib-in{grid-template-columns:1fr;}
  .ib-in{gap:40px; padding:64px 0;}
  .vgrid{gap:1px;}
  .g-tall,.g-wide{grid-column:span 6;}
  .sec{padding:80px 0;}
  .wrap{padding:0 24px;}
}
@media (max-width:560px){ .g-tall,.g-wide{grid-column:span 12;} }
@media (prefers-reduced-motion:reduce){ html{scroll-behavior:auto;} .reveal{opacity:1; transform:none; transition:none;} }
</style>
</head>

const esc = s => String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
const isEmail = s => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(s);
const ballSVG = '<svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><circle cx="12" cy="12" r="9"/><path d="M12 7l3 2-1 3.5h-4L9 9l3-2zM12 7V3M15 9l3.5-1M14 12.5l2.5 3M10 12.5l-2.5 3M9 9L5.5 8"/></svg>';
const photo = (src,alt)=>`<div class="ph"><img src="${src}" alt="${esc(alt)}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='grid'"><span class="fb">${ballSVG}</span></div>`;
const checkSVG = '<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12.5l4.5 4.5L19 7"/></svg>';

        <p class="sub">${t.hero.sub}</p>

          <button class="btn btn-accent" data-modal="gear">${t.hero.cta1}</button>
          <a class="btn btn-line" href="#impact">${t.hero.cta2}</a>
        </div>
        <div class="hero-meta">
          <div><span>${t.hero.m1n}</span><small>${t.hero.m1l}</small></div>
          <div><span>${t.hero.m2n}</span><small>${t.hero.m2l}</small></div>
        </div>
      </div>

    <section class="sec"><div class="wrap">
      <div class="head-block reveal"><div class="kicker">${t.purpose.kicker}</div><h2 class="h2">${t.purpose.title}</h2><p class="lead">${t.purpose.lead}</p></div>
      <div class="vgrid">
        ${t.purpose.values.map(v=>`<div class="vcard reveal"><div class="vi">${v[0]}</div><h3>${v[1]}</h3><p>${v[2]}</p></div>`).join("")}
      </div>
    </div></section>

    <section class="sec mission" id="mission"><div class="wrap mission-in">

      <div class="reveal">
        <div class="kicker">${t.mission.kicker}</div>
        <h2 class="h2" style="margin-top:20px">${t.mission.title}</h2>
        <p class="quote">${t.mission.q}</p>
        <p class="lead">${t.mission.p}</p>
        <div class="author"><span class="ln"></span><span>${t.mission.author}</span></div>
      </div>
    </div></section>

    <section class="sec" id="how"><div class="wrap">
      <div class="head-block reveal"><div class="kicker">${t.how.kicker}</div><h2 class="h2">${t.how.title}</h2></div>
      <div class="steps">

    <section class="sec involved" id="involved"><div class="wrap">

      <div class="icards">

        <div class="gtile g-tall reveal">${photo(IMG.heroPhoto,"Pilot delivery")}</div>

function wire(){
  const t = COPY[lang];
  document.querySelectorAll("[data-lang]").forEach(b=>b.onclick=()=>{lang=b.dataset.lang; const y=window.scrollY; render(); window.scrollTo(0,y);});
  document.querySelectorAll("[data-modal]").forEach(b=>b.onclick=()=>openModal(b.dataset.modal));
  document.querySelectorAll('a[href^="#"]').forEach(a=>a.onclick=e=>{const id=a.getAttribute("href").slice(1),el=document.getElementById(id); if(el){e.preventDefault(); document.getElementById("mnav").style.display="none"; el.scrollIntoView({behavior:"smooth",block:"start"});}});
  const burger=document.getElementById("burger"),mnav=document.getElementById("mnav");
  if(burger) burger.onclick=()=>{mnav.style.display=mnav.style.display==="block"?"none":"block";};
  const nb=document.getElementById("newsbtn");
  if(nb) nb.onclick=()=>{const v=document.getElementById("newsmail").value; if(!isEmail(v))return; document.getElementById("newswrap").innerHTML='<div class="nok">'+t.news.success+'</div>';};

  document.querySelectorAll(".num").forEach(el=>{
    const target=+el.dataset.target,plus=el.dataset.plus==="1"; let done=false;
    const reduce=window.matchMedia&&window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    const fmt=v=>v.toLocaleString(lang==="de"?"de-DE":"en-US")+(plus?"+":"");
    if(reduce){el.textContent=fmt(target); return;}
    const io=new IntersectionObserver(es=>es.forEach(e=>{
      if(e.isIntersecting&&!done){done=true; const dur=1600,t0=performance.now();
        const tick=now=>{const p=Math.min(1,(now-t0)/dur); el.textContent=fmt(Math.round(target*(1-Math.pow(1-p,3)))); if(p<1)requestAnimationFrame(tick);};
        requestAnimationFrame(tick); io.disconnect();}
    }),{threshold:.5});
    io.observe(el);
  });

  const ro=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting){e.target.classList.add("in"); ro.unobserve(e.target);}}),{threshold:.12});
  document.querySelectorAll(".reveal:not(.in)").forEach(el=>ro.observe(el));
}

function openModal(kind){
  const t=COPY[lang], f=kind==="gear"?t.forms.gear:t.forms.money;
  const ov=document.createElement("div"); ov.className="ov";
  const fields=`
    ${kind==="gear"?`<div class="field"><label>${f.club}</label><input id="m_club" placeholder="SV ..."></div>`:""}
    <div class="field"><label>${f.name} *</label><input id="m_name"></div>
    <div class="field"><label>${f.emailL} *</label><input id="m_email" type="email"></div>
    ${kind==="gear"?`<div class="field"><label>${f.place}</label><input id="m_place" placeholder="90402 N\u00fcrnberg"></div>
      <div class="field"><label>${f.whatL}</label><div class="chips" id="m_what">${f.what.map(w=>`<span class="chip" data-w="${w}">${w}</span>`).join("")}</div></div>`
     :`<div class="field"><label>${f.howL}</label><select id="m_how">${f.how.map(h=>`<option>${h}</option>`).join("")}</select></div>`}
    <div class="field"><label>${f.msg}</label><textarea id="m_msg"></textarea></div>`;
  ov.innerHTML=`<div class="modal" role="dialog" aria-modal="true">
    <div class="modal-hd"><button class="x" id="m_x" aria-label="${t.forms.close}">\u00d7</button><span class="itag">${f.tag}</span><h3>${f.title}</h3><p>${f.sub}</p></div>
    <div class="modal-bd" id="m_bd"><div class="err" id="m_err" style="display:none"></div>${fields}<button class="btn btn-ink btn-block" id="m_submit">${f.submit}</button></div>
  </div>`;
  document.body.appendChild(ov); document.body.style.overflow="hidden";
  const close=()=>{ov.remove(); document.body.style.overflow="";};
  ov.onclick=e=>{if(e.target===ov)close();};
  ov.querySelector("#m_x").onclick=close;
  const onKey=e=>{if(e.key==="Escape"){close(); window.removeEventListener("keydown",onKey);}};
  window.addEventListener("keydown",onKey);
  ov.querySelectorAll(".chip").forEach(c=>c.onclick=()=>c.classList.toggle("on"));
  ov.querySelector("#m_submit").onclick=()=>{
    const name=ov.querySelector("#m_name").value.trim(),email=ov.querySelector("#m_email").value.trim(),err=ov.querySelector("#m_err");
    if(!name||!email){err.textContent=t.forms.required; err.style.display="block"; return;}
    if(!isEmail(email)){err.textContent=t.forms.email; err.style.display="block"; return;}
    ov.querySelector("#m_bd").innerHTML=`<div class="ok"><div class="ring">${checkSVG}</div><h3>${f.okT}</h3><p>${f.okB}</p><div style="margin-top:24px"><button class="btn btn-line btn-block" id="m_done">${t.forms.close}</button></div></div>`;
    ov.querySelector("#m_done").onclick=close;
  };
}

render();
</script>
